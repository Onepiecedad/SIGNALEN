<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNALEN — Titel</title>
    <link rel="stylesheet" href="slides.css">
    <style>
      /* ── Desktop layout (unchanged 1280×720) ──────────────── */
      .slide-container {
        position: relative;
        overflow: hidden;
        width: 1280px;
        height: 720px;
      }
      .bg-video {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover; z-index: 1;
      }
      .gradient-overlay { height: 60%; }
      .content-wrapper {
        position: absolute; bottom: 0; left: 0;
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: flex-end; align-items: center;
        z-index: 3;
        padding: 0 0 40px 0;
        text-align: center;
      }
      .brands {
        font-family: var(--font-body); font-size: 14px;
        text-transform: uppercase; letter-spacing: 4px;
        color: var(--accent); margin-bottom: 10px;
      }
      .title {
        font-family: var(--font-heading); font-size: 72px;
        color: var(--text-primary); font-weight: 700;
        line-height: 1.1; margin-bottom: 5px;
      }
      .subtitle {
        font-family: var(--font-body); font-style: italic;
        font-size: 24px; color: var(--text-secondary);
        margin-bottom: 20px;
      }
      .divider {
        width: 120px; height: 2px;
        background-color: var(--accent);
        margin-bottom: 20px;
      }
      .tagline {
        font-size: 16px; color: var(--text-secondary);
        max-width: 600px; line-height: 1.5; margin-bottom: 40px;
      }
      .meta { font-size: 12px; color: var(--text-meta); line-height: 1.4; }

      /* ── Mobile responsive ─────────────────────────────────── */
      @media (max-width: 768px) {
        html, body {
          height: 100% !important;
          overflow: hidden !important;
        }
        .slide-container {
          width: 100% !important;
          height: 100% !important;
          padding: 0 !important;
          overflow: hidden !important;
        }
        .bg-video {
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          object-fit: cover;
        }
        .content-wrapper {
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          justify-content: flex-end;
          padding: 0 24px 8% 24px;
        }
        .brands {
          font-size: 10px;
          letter-spacing: 3px;
          margin-bottom: 10px;
        }
        .title {
          font-size: 44px;
          margin-bottom: 4px;
        }
        .subtitle {
          font-size: 17px;
          margin-bottom: 14px;
        }
        .divider {
          width: 70px;
          margin-bottom: 14px;
        }
        .tagline {
          font-size: 13px;
          margin-bottom: 20px;
          max-width: 100%;
          padding: 0 8px;
          line-height: 1.5;
        }
        .meta {
          font-size: 10px;
        }
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <video class="bg-video" autoplay muted loop playsinline>
            <source src="../videos/Hamnen.mp4" type="video/mp4">
        </video>
        <div class="gradient-overlay"></div>
        <div class="content-wrapper">
            <div class="brands">SKYLAND AI SOLUTIONS × ESCAPE HOUSE GOTHENBURG</div>
            <div class="title">SIGNALEN</div>
            <div class="subtitle">The Signal</div>
            <div class="divider"></div>
            <div class="tagline">En smart escape room med adaptiv svårighetsgrad, dynamiska konsekvenser, eskalerande atmosfär och en berättelse som vänder sig mot spelarna</div>
            <div class="meta">
                Konceptdokument v4.0 — Mars 2026<br>
                Framtaget av Joakim Landqvist, Skyland AI Solutions
            </div>
        </div>
    </div>
</body>
</html>
